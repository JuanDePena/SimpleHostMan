[commands]
upgrade_type = security
random_sleep = 0
network_online_timeout = 60
download_updates = yes
apply_updates = no
reboot = never
reboot_command = "shutdown -r +5 'Rebooting after applying package updates'"

[emitters]
emit_via = stdio

[email]
email_from = root@example.com
email_to = root
email_host = localhost
email_port = 25
email_tls = no

[command]

[command_email]
email_from = root@example.com
email_to = root

[base]
debuglevel = 1
