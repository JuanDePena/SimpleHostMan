# SimpleHost administrative access hardening applied on 2026-05-02.
# Routine administration should use the non-root almalinux sudo path.
# Root remains available only as a key-based break-glass account.
PermitRootLogin prohibit-password
PasswordAuthentication no
KbdInteractiveAuthentication no
PubkeyAuthentication yes
PermitEmptyPasswords no
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
