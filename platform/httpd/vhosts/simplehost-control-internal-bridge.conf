Listen 10.88.0.1:13200

<VirtualHost 10.88.0.1:13200>
  ServerName simplehost-control-internal.pyrosa.local

  AllowEncodedSlashes NoDecode

  ProxyPreserveHost On
  ProxyRequests Off
  ProxyAddHeaders On
  RequestHeader set X-Forwarded-Proto "https"
  RequestHeader set X-Forwarded-Port "3200"

  <Location />
    Require ip 10.88.0.0/16
  </Location>

  RewriteEngine On
  RewriteCond %{HTTP:Upgrade} websocket [NC]
  RewriteCond %{HTTP:Connection} upgrade [NC]
  RewriteRule /(.*) ws://127.0.0.1:3200/$1 [P,L]

  ProxyPass / http://127.0.0.1:3200/ nocanon retry=0 timeout=120
  ProxyPassReverse / http://127.0.0.1:3200/

  ErrorLog /var/log/httpd/vps-prd.pyrosa.com.do_3200_bridge_error.log
  CustomLog /var/log/httpd/vps-prd.pyrosa.com.do_3200_bridge_access.log combined
</VirtualHost>
